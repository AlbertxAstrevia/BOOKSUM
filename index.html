  <style>
    /* CSS Variables & Design Tokens */
    :root {
      --cream: #FDF8F0;
      --cream2: #F5EDD8;
      --blue: #3B82F6;
      --blue-dark: #2563EB;
      --blue-light: #EFF6FF;
      --amber: #D97706;
      --violet: #7C3AED;
      --ink: #1C1C1E;
      --muted: #6B7280;
      --white: #FFFFFF;
      --green: #10B981;
      --red: #EF4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body, #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--ink);
    }

    /* App Container */
    .app-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      background: var(--cream);
    }

    /* Main Content Area */
    .screen-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: calc(60px + env(safe-area-inset-bottom));
      -webkit-overflow-scrolling: touch;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      padding-bottom: env(safe-area-inset-bottom);
      background: var(--white);
      border-top: 1px solid #E5E5E5;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 1000;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      transition: color 0.2s;
    }

    .nav-item.active {
      color: var(--blue);
    }

    /* Header */
    .header {
      padding: 16px;
      background: var(--white);
      border-bottom: 1px solid #E5E5E5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
    }

    .header-title.amber { color: var(--amber); }
    .header-title.blue { color: var(--blue); }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--blue-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: var(--blue);
    }

    /* Search Bar */
    .search-bar {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
    }

    .search-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #E5E5E5;
      border-radius: 8px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--blue);
      background: var(--blue-light);
    }

    /* Genre Dropdown */
    .genre-dropdown {
      padding: 0 16px;
      display: flex;
      gap: 8px;
    }

    .genre-select {
      padding: 10px 12px;
      border: 1px solid #E5E5E5;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      background: var(--white);
      cursor: pointer;
    }

    .genre-select:focus {
      outline: none;
      border-color: var(--blue);
    }

    /* Section Label */
    .section-label {
      padding: 16px 16px 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Book Grid */
    .book-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 12px 16px;
    }

    .book-card {
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .book-card:active {
      transform: scale(0.98);
    }

    .book-card-image {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      background: linear-gradient(135deg, var(--blue-light), var(--cream2));
    }

    .book-card-content {
      padding: 12px;
    }

    .book-card-title {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
      color: var(--ink);
    }

    .book-card-author {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .genre-tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Buttons */
    .btn {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background: var(--blue);
      color: var(--white);
    }

    .btn-primary:active {
      background: var(--blue-dark);
    }

    .btn-secondary {
      background: var(--cream2);
      color: var(--ink);
    }

    .btn-secondary:active {
      background: #E5DCC8;
    }

    .btn-sm {
      padding: 8px 12px;
      font-size: 13px;
    }

    /* Detail Screen */
    .detail-header {
      position: relative;
      padding-bottom: 200px;
      background: linear-gradient(135deg, var(--blue), var(--violet));
      color: var(--white);
      overflow: hidden;
    }

    .detail-back-btn {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 8px;
      color: var(--white);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .detail-hero {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      display: flex;
      gap: 16px;
      padding: 16px;
      align-items: flex-end;
    }

    .detail-hero-image {
      width: 120px;
      height: 160px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--cream);
    }

    .detail-hero-text {
      flex: 1;
      color: var(--white);
    }

    .detail-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .detail-author {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 8px;
    }

    .detail-genre-tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(255,255,255,0.2);
      color: var(--white);
    }

    .detail-tabs {
      display: flex;
      gap: 16px;
      padding: 16px;
      background: var(--white);
      border-bottom: 1px solid #E5E5E5;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .tab {
      padding: 8px 0;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }

    .tab-content {
      padding: 16px;
    }

    /* Editor */
    .editor-toolbar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--white);
      border-bottom: 1px solid #E5E5E5;
      flex-wrap: wrap;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .toolbar-btn {
      width: 36px;
      height: 36px;
      border: 1px solid #E5E5E5;
      border-radius: 6px;
      background: var(--white);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .toolbar-btn:active {
      background: var(--blue-light);
      border-color: var(--blue);
    }

    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: #E5E5E5;
      margin: 0 4px;
    }

    .contenteditable {
      padding: 16px;
      font-size: 16px;
      line-height: 1.6;
      outline: none;
      background: var(--white);
      color: var(--ink);
    }

    .contenteditable:focus {
      background: var(--blue-light);
    }

    /* Form Inputs */
    .form-group {
      padding: 12px 0;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #E5E5E5;
      border-radius: 8px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--blue);
      background: var(--blue-light);
    }

    /* Genre Chips */
    .genre-chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .genre-chip {
      padding: 8px 12px;
      border: 2px solid #E5E5E5;
      border-radius: 20px;
      background: var(--white);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      font-size: 13px;
      font-weight: 600;
    }

    .genre-chip.selected {
      border-color: var(--blue);
      background: var(--blue-light);
      color: var(--blue);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: flex-end;
      z-index: 2000;
    }

    .modal {
      width: 100%;
      background: var(--white);
      border-radius: 16px 16px 0 0;
      padding: 20px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--muted);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 16px;
      right: 16px;
      background: var(--ink);
      color: var(--white);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 1500;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* Card */
    .card {
      background: var(--white);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #E5E5E5;
    }

    .card-gradient {
      background: linear-gradient(135deg, var(--blue), var(--violet));
      color: var(--white);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px 16px;
      color: var(--muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    /* Toggle */
    .toggle-btn {
      display: inline-flex;
      gap: 8px;
      background: var(--cream2);
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 4px;
    }

    .toggle-btn-item {
      flex: 1;
      padding: 8px 16px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .toggle-btn-item.active {
      background: var(--white);
      color: var(--blue);
    }

    /* Stats */
    .stat-pills {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 0 16px 16px;
    }

    .stat-pill {
      background: var(--white);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid #E5E5E5;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--blue);
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Responsive */
    @media (min-width: 768px) {
      .book-grid {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }
  </style>
</head>

    const drivePdf = (id) => id ? `https://drive.google.com/file/d/${id}/view` : '';

    function useLocalStorage(key, def) {
      const [val, setVal] = useState(() => {
        try {
          const s = localStorage.getItem(key);
          return s ? JSON.parse(s) : def;
        } catch {
          return def;
        }
      });
      const set = useCallback((v) => {
        const next = typeof v === 'function' ? v(val) : v;
        setVal(next);
        try {
          localStorage.setItem(key, JSON.stringify(next));
        } catch {}
      }, [key, val]);
      return [val, set];
    }

    async function callClaude(apiKey, messages, imageBase64 = null) {
      const content = imageBase64
        ? [{ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageBase64 } }, { type: 'text', text: messages }]
        : [{ type: 'text', text: messages }];
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1500,
          messages: [{ role: 'user', content }]
        })
      });
      if (!res.ok) throw new Error(`API error ${res.status}`);
      const data = await res.json();
      return data.content[0].text;
    }

    // ============================================================================
    // GOOGLE DRIVE SYNC HELPERS
    // ============================================================================

    const DRIVE_FILE_NAME = 'BOOKSUM_data.json';
    const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';

    async function driveFetch(token, method, url, body = null, isForm = false) {
      const headers = { Authorization: `Bearer ${token}` };
      const opts = { method, headers };
      if (body && !isForm) {
        headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      } else if (body && isForm) {
        opts.body = body;
      }
      const res = await fetch(url, opts);
      if (!res.ok) {
        const txt = await res.text().catch(() => res.status);
        throw new Error(`Drive API ${res.status}: ${txt}`);
      }
      const ct = res.headers.get('content-type') || '';
      if (ct.includes('json')) return res.json();
      return res.text();
    }

    async function findDriveFile(token, name) {
      const q = encodeURIComponent(`name='${name}' and not trashed`);
      const data = await driveFetch(token, 'GET',
        `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)&pageSize=5`
      );
      return data.files?.[0] || null;
    }

    async function createDriveFile(token, name, content) {
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ name, mimeType: 'application/json' })], { type: 'application/json' }));
      form.append('file', new Blob([content], { type: 'application/json' }));
      return driveFetch(token, 'POST',
        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
        form, true
      );
    }

    async function updateDriveFile(token, fileId, content) {
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ mimeType: 'application/json' })], { type: 'application/json' }));
      form.append('file', new Blob([content], { type: 'application/json' }));
      return driveFetch(token, 'PATCH',
        `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart&fields=id`,
        form, true
      );
    }

    async function readDriveFile(token, fileId) {
      const result = await driveFetch(token, 'GET',
        `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`
      );
      return typeof result === 'string' ? JSON.parse(result) : result;
    }

    function BookDetailScreen({ book, genres, onBack, onUpdate, apiKey }) {
      const [activeTab, setActiveTab] = useState('ideas');
      const [isEditingNotes, setIsEditingNotes] = useState(false);
      const [notesContent, setNotesContent] = useState(book.notes);
      const [toast, setToast] = useState(null);
      const editorRef = useRef(null);
      const scanRef = useRef(null);

      const genre = genres.find(g => g.id === book.genre);

      const handleSaveNotes = () => {
        onUpdate({ ...book, notes: notesContent });
        setIsEditingNotes(false);
        setToast('Notes saved');
      };

      const handleGenerateIdeas = async () => {
        if (!apiKey) {
          setToast('API key required');
          return;
        }
        if (!notesContent) {
          setToast('Add notes first');
          return;
        }
        try {
          const prompt = `Based on these notes about "${book.title}" by ${book.author}, generate 5-7 key ideas as concise numbered insights, each 1-2 sentences. Return ONLY a JSON array of strings. Notes: ${notesContent}`;
          const result = await callClaude(apiKey, prompt);
          const ideas = JSON.parse(result);
          onUpdate({ ...book, keyIdeas: ideas });
          setToast('Ideas generated');
        } catch (e) {
          setToast('Failed to generate ideas');
        }
      };

      const handleToolbarCmd = (cmd, val = null) => {
        if (editorRef.current) {
          editorRef.current.focus();
          document.execCommand(cmd, false, val);
        }
      };

      const handleScanText = async (e) => {
        const file = e.target.files?.[0];
        if (!file || !apiKey) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const base64 = ev.target?.result?.split(',')[1];
          if (!base64) return;
          try {
            const text = await callClaude(apiKey, 'Extract all text from this image exactly as written.', base64);
            if (editorRef.current) {
              editorRef.current.focus();
              document.execCommand('insertText', false, text + ' ');
            }
          } catch (err) {
            setToast('Scan failed');
          }
        };
        reader.readAsDataURL(file);
      };

      const handlePaste = async () => {
        try {
          const text = await navigator.clipboard.readText();
          if (editorRef.current) {
            editorRef.current.focus();
            document.execCommand('insertText', false, text);
          }
        } catch {
          setToast('Paste failed');
        }
      };

      const handlePolishText = async () => {
        if (!apiKey || !editorRef.current) return;
        const content = editorRef.current.innerHTML;
        try {
          const result = await callClaude(apiKey, `Polish and improve this text, keeping the original meaning. Return clean HTML with bold/italic/ul/ol/p formatting: ${content}`);
          setNotesContent(result);
          if (editorRef.current) {
            editorRef.current.innerHTML = result;
          }

          setToast('Polish failed');

        <>

                    <p>No key ideas yet</p>
                  </div>

                {book.summaryId && (
                  <a href={drivePdf(book.summaryId)} target="_blank" rel="noopener noreferrer" className="btn btn-primary" style={{ display: 'block', textAlign: 'center', marginTop: '16px', textDecoration: 'none' }}>

                {apiKey && (

                    ✦ Generate Key Ideas

              </div>
            )}

            {activeTab === 'notes' && !isEditingNotes && (
              <div className="tab-content">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                  <strong>My Notes</strong>

                  <button className="toolbar-btn" onClick={() => handleToolbarCmd('insertUnorderedList')} title="Bullet">

                  <div style={{ flex: 1 }} />
                  <button className="btn btn-secondary btn-sm" onClick={() => setIsEditingNotes(false)}>

                />
              </>
            )}
          </div>

          {toast && <Toast message={toast} onDismiss={() => setToast(null)} />}
        </>
      );

    function AddScreen({ genres, onAddBook, onAddPodcast, onNavigate }) {
      const [type, setType] = useState('book');
      const [title, setTitle] = useState('');
      const [author, setAuthor] = useState('');

        setTitle('');

      const handleAddPodcast = async () => {
        if (!podcastUrl || !podcastHost) {

    function StatisticsScreen({ books, podcasts, genres, onBack, apiKey }) {
      const [toast, setToast] = useState(null);

      const currentYear = new Date().getFullYear();
      const currentMonth = new Date().getMonth();

      const totalBooks = books.length;
      const totalPodcasts = podcasts.length;
      const thisYearBooks = books.filter(b => new Date(b.addedAt).getFullYear() === currentYear).length;
      const thisMonthBooks = books.filter(b => {
        const d = new Date(b.addedAt);
        return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
      }).length;

      const genreCounts = genres.map(g => ({
        ...g,
        count: books.filter(b => b.genre === g.id).length
      })).sort((a, b) => b.count - a.count);

      const topGenre = genreCounts[0]?.label || 'N/A';

      return (
        <>
          <button className="detail-back-btn" onClick={onBack}>←</button>
          <div className="header" style={{ paddingTop: '50px' }}>
            <span className="header-title">Statistics</span>
            <div style={{ width: '36px' }} />
          </div>

          <div className="screen-content">
            <div className="stat-pills">
              <div className="stat-pill">
                <div className="stat-value">{totalBooks}</div>
                <div className="stat-label">Total Books</div>
              </div>
              <div className="stat-pill">
                <div className="stat-value">{totalPodcasts}</div>
                <div className="stat-label">Podcasts</div>
              </div>
              <div className="stat-pill">
                <div className="stat-value">{thisYearBooks}</div>
                <div className="stat-label">This Year</div>
              </div>
            </div>

            <div className="stat-pills">
              <div className="stat-pill">
                <div className="stat-value">{thisMonthBooks}</div>
                <div className="stat-label">This Month</div>
              </div>
              <div className="stat-pill">
                <div className="stat-value">{totalBooks > 0 ? Math.round(totalBooks / 12) : 0}</div>
                <div className="stat-label">Avg/Month</div>
              </div>
              <div className="stat-pill">
                <div className="stat-value" style={{ fontSize: '14px', whiteSpace: 'nowrap' }}>
                  {topGenre.replace(/[🧠🔬❤️📜💭💼🚀📖💰💻🌱]/g, '').trim()}
                </div>
                <div className="stat-label">Top Genre</div>
              </div>
            </div>

            <div style={{ padding: '16px' }}>
              <div className="section-label">Genre Breakdown</div>
              {genreCounts.map(g => (
                <div key={g.id} style={{ marginBottom: '12px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '4px', fontSize: '13px' }}>
                    <span>{g.label}</span>
                    <span>{g.count}</span>
                  </div>
                  <div style={{ height: '6px', background: '#E5E5E5', borderRadius: '3px', overflow: 'hidden' }}>
                    <div
                      style={{
                        height: '100%',
                        background: g.text,
                        width: `${totalBooks > 0 ? (g.count / totalBooks) * 100 : 0}%`,
                      }}
                    />
                  </div>
                </div>
              ))}
            </div>
          </div>

          {toast && <Toast message={toast} onDismiss={() => setToast(null)} />}
        </>
      );
    }

    function ManageGenresScreen({ genres, books, onUpdateGenres, onBack }) {
      const [showAddModal, setShowAddModal] = useState(false);
      const [newGenreName, setNewGenreName] = useState('');
      const [newGenreColor, setNewGenreColor] = useState('#EFF6FF');

      const genresWithCounts = genres.map(g => ({
        ...g,
        count: books.filter(b => b.genre === g.id).length
      }));

      const handleAddGenre = () => {
        if (!newGenreName) return;
        const newId = newGenreName.toLowerCase().replace(/\s+/g, '_');
        onUpdateGenres([...genres, { id: newId, label: newGenreName, color: newGenreColor, text: '#1C1C1E' }]);
        setNewGenreName('');
        setShowAddModal(false);
      };

      return (
        <>
          <button className="detail-back-btn" onClick={onBack}>←</button>
          <div className="header" style={{ paddingTop: '50px' }}>
            <span className="header-title">Genres</span>

          </div>

          <div className="screen-content">
            <div style={{ padding: '16px' }}>
              {genresWithCounts.map(g => (
                <div key={g.id} className="card">
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div>
                      <div>{g.label}</div>
                      <div style={{ fontSize: '12px', color: '#6B7280' }}>{g.count} books</div>
                    </div>
                    <div style={{ width: '20px', height: '20px', borderRadius: '4px', background: g.color, border: '1px solid #E5E5E5' }} />
                  </div>
                </div>
              ))}
            </div>
          </div>

          {showAddModal && (
            <div className="modal-overlay" onClick={() => setShowAddModal(false)}>
              <div className="modal" onClick={(e) => e.stopPropagation()}>
                <div className="modal-header">
                  <h2 className="modal-title">Add Genre</h2>
                  <button className="close-btn" onClick={() => setShowAddModal(false)}>×</button>
                </div>
                <input
                  className="form-input"
                  type="text"
                  value={newGenreName}
                  onChange={(e) => setNewGenreName(e.target.value)}

                <div style={{ marginTop: '12px', marginBottom: '12px' }}>
                  <label className="form-label">Color</label>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '8px' }}>
                    {['#EFF6FF', '#ECFDF5', '#FEF9C3', '#FEE2E2', '#F3E8FF', '#FEF3C7', '#DBEAFE', '#FCE7F3', '#E0F2FE', '#F1F5F9', '#DCFCE7'].map(c => (
                      <button
                        key={c}
                        onClick={() => setNewGenreColor(c)}
                        style={{
                          width: '100%',
                          height: '40px',
                          background: c,
                          border: newGenreColor === c ? '3px solid #3B82F6' : '1px solid #E5E5E5',
                          borderRadius: '8px',
                          cursor: 'pointer'
                        }}
                      />
                    ))}
                  </div>
                </div>
                <button className="btn btn-primary" onClick={handleAddGenre} style={{ width: '100%' }}>
                  Add Genre
                </button>
              </div>
            </div>
          )}
        </>
      );
    }

    // ============================================================================

    function App() {
      const [currentScreen, setCurrentScreen] = useState('library');
      const [selectedBook, setSelectedBook] = useState(null);
      const [selectedPodcast, setSelectedPodcast] = useState(null);

      const [books, setBooks] = useLocalStorage('booksum_v2_books', SEED_BOOKS);
      const [podcasts, setPodcasts] = useLocalStorage('booksum_v2_podcasts', []);
      const [genres, setGenres] = useLocalStorage('booksum_v2_genres', DEFAULT_GENRES);
      const [settings, setSettings] = useLocalStorage('booksum_v2_settings', { apiKey: '', language: 'en' });

      const handleAddBook = (bookData) => {
        const newBook = {
          id: Math.max(0, ...books.map(b => b.id)) + 1,
          genre: bookData.genre,
          title: bookData.title,
          author: bookData.author,
          imageId: '',
          summaryId: '',
          notes: bookData.notes,
          keyIdeas: [],
          addedAt: Date.now()
        };
        setBooks([...books, newBook]);
      };

      const handleAddPodcast = (podcastData) => {
        const newPodcast = {
          id: Math.max(0, ...podcasts.map(p => p.id)) + 1,
          title: podcastData.title,
          host: podcastData.host,
          topic: podcastData.topic,
          url: podcastData.url,
          notes: podcastData.notes || '',
          keyIdeas: podcastData.keyIdeas || [],
          addedAt: Date.now()
        };
        setPodcasts([...podcasts, newPodcast]);
      };

      const handleUpdateBook = (updatedBook) => {
        setBooks(books.map(b => b.id === updatedBook.id ? updatedBook : b));
      };

      const handleUpdatePodcast = (updatedPodcast) => {
        setPodcasts(podcasts.map(p => p.id === updatedPodcast.id ? updatedPodcast : p));
      };

      const handleSetApiKey = (key) => {
        setSettings({ ...settings, apiKey: key });
      };

      const handleSetGoogleClientId = (id) => {
        setSettings({ ...settings, googleClientId: id.trim() });
      };

      // ── Google Drive sync state ──────────────────────────────────────────────
      const [driveToken, setDriveToken] = useState(null);
      const [driveFileId, setDriveFileId] = useState(() => {
        try { return localStorage.getItem('booksum_drive_fid') || null; } catch { return null; }
      });
      const [driveConnected, setDriveConnected] = useState(false);
      const [driveSyncing, setDriveSyncing] = useState(false);
      const [driveLastSync, setDriveLastSync] = useState(() => {
        try { return localStorage.getItem('booksum_drive_sync') || null; } catch { return null; }
      });
      const [driveError, setDriveError] = useState(null);
      const [driveEmail, setDriveEmail] = useState(() => {
        try { return localStorage.getItem('booksum_drive_email') || null; } catch { return null; }
      });
      const syncTimerRef = useRef(null);
      const tokenClientRef = useRef(null);

      // Persist driveFileId to localStorage whenever it changes
      useEffect(() => {
        if (driveFileId) localStorage.setItem('booksum_drive_fid', driveFileId);
        else localStorage.removeItem('booksum_drive_fid');
      }, [driveFileId]);

      // Build / rebuild the GIS token client when clientId is set
      const buildTokenClient = useCallback((clientId) => {
        if (!clientId || !window.google?.accounts?.oauth2) return null;
        return window.google.accounts.oauth2.initTokenClient({
          client_id: clientId,
          scope: DRIVE_SCOPE,
          callback: async (resp) => {
            if (resp.error) {
              setDriveError(resp.error_description || resp.error);
              return;
            }
            const tok = resp.access_token;
            setDriveToken(tok);
            setDriveConnected(true);
            setDriveError(null);
            // Fetch user email
            try {
              const u = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                headers: { Authorization: `Bearer ${tok}` }
              }).then(r => r.json());
              const email = u.email || '';
              setDriveEmail(email);
              localStorage.setItem('booksum_drive_email', email);
            } catch {}
            // Load data from Drive on first connect
            await loadFromDriveWithToken(tok);
          }
        });
      }, []);

      const connectDrive = () => {
        if (!settings.googleClientId) {
          setDriveError('Please enter your Google Client ID first (tap the pencil icon).');
          return;
        }
        if (!window.google?.accounts?.oauth2) {
          setDriveError('Google library not loaded — check your internet connection.');
          return;
        }
        if (!tokenClientRef.current) {
          tokenClientRef.current = buildTokenClient(settings.googleClientId);
        }
        tokenClientRef.current?.requestAccessToken();
      };

      const disconnectDrive = () => {
        if (driveToken && window.google?.accounts?.oauth2) {
          try { window.google.accounts.oauth2.revoke(driveToken, () => {}); } catch {}
        }
        setDriveToken(null);
        setDriveConnected(false);
        setDriveFileId(null);
        setDriveEmail(null);
        setDriveError(null);
        localStorage.removeItem('booksum_drive_fid');
        localStorage.removeItem('booksum_drive_email');
        localStorage.removeItem('booksum_drive_sync');
      };

      // saveToDrive — takes live state values as args so it can be called from effects
      const saveToDriveWithToken = useCallback(async (tok, bks, pods, gnrs, fid) => {
        if (!tok) return;
        setDriveSyncing(true);
        setDriveError(null);
        try {
          const payload = JSON.stringify({ version: 2, exportedAt: new Date().toISOString(), books: bks, podcasts: pods, genres: gnrs }, null, 2);
          let resolvedFid = fid;
          if (!resolvedFid) {
            const existing = await findDriveFile(tok, DRIVE_FILE_NAME);
            resolvedFid = existing ? existing.id : (await createDriveFile(tok, DRIVE_FILE_NAME, payload)).id;
            setDriveFileId(resolvedFid);
          } else {
            await updateDriveFile(tok, resolvedFid, payload);
          }
          const now = new Date().toISOString();
          setDriveLastSync(now);
          localStorage.setItem('booksum_drive_sync', now);
        } catch (e) {
          setDriveError(e.message);
        } finally {
          setDriveSyncing(false);
        }
      }, []);

      const loadFromDriveWithToken = useCallback(async (tok) => {
        if (!tok) return;
        setDriveSyncing(true);
        setDriveError(null);
        try {
          let fid = driveFileId;
          if (!fid) {
            const existing = await findDriveFile(tok, DRIVE_FILE_NAME);
            if (!existing) { setDriveSyncing(false); return; }
            fid = existing.id;
            setDriveFileId(fid);
          }
          const data = await readDriveFile(tok, fid);
          if (data.books) setBooks(data.books);
          if (data.podcasts) setPodcasts(data.podcasts);
          if (data.genres) setGenres(data.genres);
          const now = new Date().toISOString();
          setDriveLastSync(now);
          localStorage.setItem('booksum_drive_sync', now);
        } catch (e) {
          setDriveError(e.message);
        } finally {
          setDriveSyncing(false);
        }
      }, [driveFileId]);

      // Auto-sync 3 s after data changes (debounced)
      useEffect(() => {
        if (!driveConnected || !driveToken) return;
        if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
        syncTimerRef.current = setTimeout(() => {
          saveToDriveWithToken(driveToken, books, podcasts, genres, driveFileId);
        }, 3000);
        return () => clearTimeout(syncTimerRef.current);
      }, [books, podcasts, genres, driveConnected, driveToken]);

      return (
        <div className="app-container">
          {currentScreen === 'library' && (
            <LibraryScreen
              books={books}
              genres={genres}
              onSelectBook={(book) => {
                setSelectedBook(book);
                setCurrentScreen('book-detail');
              }}
              apiKey={settings.apiKey}
              onNavigate={setCurrentScreen}
            />
          )}

          {currentScreen === 'book-detail' && selectedBook && (
            <BookDetailScreen
              book={selectedBook}
              genres={genres}
              onBack={() => setCurrentScreen('library')}
              onUpdate={(updated) => {
                handleUpdateBook(updated);
                setSelectedBook(updated);
              }}
              apiKey={settings.apiKey}
            />
          )}

          {currentScreen === 'podcasts' && (
            <PodcastsScreen
              podcasts={podcasts}
              genres={genres}
              onSelectPodcast={(podcast) => {
                setSelectedPodcast(podcast);
                setCurrentScreen('podcast-detail');
              }}
              onNavigate={setCurrentScreen}
            />
          )}

          {currentScreen === 'podcast-detail' && selectedPodcast && (
            <PodcastDetailScreen
              podcast={selectedPodcast}
              genres={genres}
              onBack={() => setCurrentScreen('podcasts')}
              onUpdate={(updated) => {
                handleUpdatePodcast(updated);
                setSelectedPodcast(updated);
              }}
              apiKey={settings.apiKey}
            />
          )}

          {currentScreen === 'add' && (
            <AddScreen
              genres={genres}
              onAddBook={handleAddBook}
              onAddPodcast={handleAddPodcast}
              onNavigate={setCurrentScreen}
            />
          )}

          {currentScreen === 'settings' && (
            <SettingsScreen
              apiKey={settings.apiKey}
              onSetApiKey={handleSetApiKey}
              googleClientId={settings.googleClientId || ''}
              onSetGoogleClientId={handleSetGoogleClientId}
              driveConnected={driveConnected}
              driveEmail={driveEmail}
              driveSyncing={driveSyncing}
              driveLastSync={driveLastSync}
              driveError={driveError}
              onConnectDrive={connectDrive}
              onDisconnectDrive={disconnectDrive}
              onSyncNow={() => saveToDriveWithToken(driveToken, books, podcasts, genres, driveFileId)}
              onNavigate={setCurrentScreen}
            />
          )}

          {currentScreen === 'statistics' && (
            <StatisticsScreen
              books={books}
              podcasts={podcasts}
              genres={genres}
              onBack={() => setCurrentScreen('settings')}
              apiKey={settings.apiKey}
            />
          )}

          {currentScreen === 'genres' && (
            <ManageGenresScreen
              genres={genres}
              books={books}
              onUpdateGenres={setGenres}
              onBack={() => setCurrentScreen('settings')}
            />
          )}

          {/* Bottom Navigation */}
          <div className="bottom-nav">
            <div
              className={`nav-item ${currentScreen === 'library' ? 'active' : ''}`}
              onClick={() => setCurrentScreen('library')}
            >
              <div style={{ fontSize: '20px' }}>📚</div>
              <div>Library</div>
            </div>
            <div
              className={`nav-item ${currentScreen === 'podcasts' ? 'active' : ''}`}
              onClick={() => setCurrentScreen('podcasts')}
            >
              <div style={{ fontSize: '20px' }}>🎧</div>
              <div>Podcasts</div>
            </div>
            <div
              className={`nav-item`}
              onClick={() => setCurrentScreen('add')}
            >
              <div style={{ fontSize: '20px' }}>➕</div>
              <div>Add</div>
            </div>
            <div
              className={`nav-item ${currentScreen === 'settings' ? 'active' : ''}`}
              onClick={() => setCurrentScreen('settings')}
            >
              <div style={{ fontSize: '20px' }}>⚙️</div>
              <div>Settings</div>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================================
    // RENDER APP
    // ============================================================================

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
