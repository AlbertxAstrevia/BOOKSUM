  <style>
    /* CSS Variables & Design Tokens */
    :root {
      --cream: #FDF8F0;
      --cream2: #F5EDD8;
      --blue: #3B82F6;
      --blue-dark: #2563EB;
      --blue-light: #EFF6FF;
      --amber: #D97706;
      --violet: #7C3AED;
      --ink: #1C1C1E;
      --muted: #6B7280;
      --white: #FFFFFF;
      --green: #10B981;
      --red: #EF4444;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body, #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--ink);
    }

    /* App Container */
    .app-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      background: var(--cream);
    }

    /* Main Content Area */
    .screen-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
      -webkit-overflow-scrolling: touch;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--white);
      border-top: 1px solid #E5E5E5;
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 8px;
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      min-height: calc(60px + env(safe-area-inset-bottom));
      z-index: 1000;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      transition: color 0.2s;
    }

    .nav-item.active {
      color: var(--blue);
    }

    /* Header */
    .header {
      padding: calc(env(safe-area-inset-top) + 12px) 16px 12px;
      background: var(--white);
      border-bottom: 1px solid #E5E5E5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
    }

    .header-title.amber { color: var(--amber); }
    .header-title.blue { color: var(--blue); }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--blue-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: var(--blue);
    }

    /* Search Bar */
    .search-bar {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
    }

    .search-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #E5E5E5;
      border-radius: 8px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--blue);
      background: var(--blue-light);
    }

    /* Genre Dropdown */
    .genre-dropdown {
      padding: 0 16px;
      display: flex;
      gap: 8px;
    }

    .genre-select {
      padding: 10px 12px;
      border: 1px solid #E5E5E5;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      background: var(--white);
      cursor: pointer;
    }

    .genre-select:focus {
      outline: none;
      border-color: var(--blue);
    }

    /* Section Label */
    .section-label {
      padding: 16px 16px 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Book Grid */
    .book-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 12px 16px;
    }

    .book-card {
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .book-card:active {
      transform: scale(0.98);
    }

    .book-card-image {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      background: linear-gradient(135deg, var(--blue-light), var(--cream2));
    }

    .book-card-content {
      padding: 12px;
    }

    .book-card-title {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
      color: var(--ink);
    }

    .book-card-author {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .genre-tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Buttons */
    .btn {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background: var(--blue);
      color: var(--white);
    }

    .btn-primary:active {
      background: var(--blue-dark);
    }

    .btn-secondary {
      background: var(--cream2);
      color: var(--ink);
    }

    .btn-secondary:active {
      background: #E5DCC8;
    }

    .btn-sm {
      padding: 8px 12px;
      font-size: 13px;
    }

    /* Detail Screen — tuned for iPhone 15 (393pt wide, Dynamic Island) */
    .detail-header {
      position: relative;
      /* top area = safe-area-inset-top (≈59pt on iPhone 15) + space for back btn */
      padding-top: calc(env(safe-area-inset-top) + 56px);
      padding-bottom: 0;
      min-height: calc(env(safe-area-inset-top) + 280px);
      background: linear-gradient(150deg, var(--blue) 0%, var(--violet) 100%);
      color: var(--white);
      overflow: hidden;
    }

    .detail-back-btn {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 12px);
      left: 16px;
      width: 44px;
      height: 44px;
      background: rgba(0,0,0,0.35);
      border: none;
      border-radius: 22px;
      color: var(--white);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .detail-hero {
      display: flex;
      gap: 16px;
      padding: 16px 16px 24px;
      align-items: flex-end;
    }

    .detail-hero-image {
      width: 110px;
      height: 150px;
      border-radius: 10px;
      object-fit: cover;
      background: var(--cream);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      flex-shrink: 0;
    }

    .detail-hero-text {
      flex: 1;
      color: var(--white);
    }

    .detail-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .detail-author {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 8px;
    }

    .detail-genre-tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(255,255,255,0.2);
      color: var(--white);
    }

    .detail-tabs {
      display: flex;
      gap: 16px;
      padding: 16px;
      background: var(--white);
      border-bottom: 1px solid #E5E5E5;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .tab {
      padding: 8px 0;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }

    .tab-content {
      padding: 16px;
    }

    /* Editor */
    .editor-toolbar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--white);
      border-bottom: 1px solid #E5E5E5;
      flex-wrap: wrap;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .toolbar-btn {
      width: 36px;
      height: 36px;
      border: 1px solid #E5E5E5;
      border-radius: 6px;
      background: var(--white);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .toolbar-btn:active {
      background: var(--blue-light);
      border-color: var(--blue);
    }

    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: #E5E5E5;
      margin: 0 4px;
    }

    .contenteditable {
      padding: 16px;
      font-size: 16px;
      line-height: 1.6;
      outline: none;
      background: var(--white);
      color: var(--ink);
    }

    .contenteditable:focus {
      background: var(--blue-light);
    }

    /* Form Inputs */
    .form-group {
      padding: 12px 0;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #E5E5E5;
      border-radius: 8px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--blue);
      background: var(--blue-light);
    }

    /* Genre Chips */
    .genre-chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .genre-chip {
      padding: 8px 12px;
      border: 2px solid #E5E5E5;
      border-radius: 20px;
      background: var(--white);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      font-size: 13px;
      font-weight: 600;
    }

    .genre-chip.selected {
      border-color: var(--blue);
      background: var(--blue-light);
      color: var(--blue);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: flex-end;
      z-index: 2000;
    }

    .modal {
      width: 100%;
      background: var(--white);
      border-radius: 16px 16px 0 0;
      padding: 20px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--muted);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 16px;
      right: 16px;
      background: var(--ink);
      color: var(--white);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 1500;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* Card */
    .card {
      background: var(--white);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #E5E5E5;
    }

    .card-gradient {
      background: linear-gradient(135deg, var(--blue), var(--violet));
      color: var(--white);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px 16px;
      color: var(--muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    /* Toggle */
    .toggle-btn {
      display: inline-flex;
      gap: 8px;
      background: var(--cream2);
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 4px;
    }

    .toggle-btn-item {
      flex: 1;
      padding: 8px 16px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .toggle-btn-item.active {
      background: var(--white);
      color: var(--blue);
    }

    /* Stats */
    .stat-pills {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 0 16px 16px;
    }

    .stat-pill {
      background: var(--white);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid #E5E5E5;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--blue);
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Responsive */
    @media (min-width: 768px) {
      .book-grid {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }
  </style>
</head>

    function useLocalStorage(key, def) {
      const [val, setVal] = useState(() => {
        try {
          const s = localStorage.getItem(key);
          return s ? JSON.parse(s) : def;
        } catch {
          return def;
        }
      });
      const set = useCallback((v) => {
        const next = typeof v === 'function' ? v(val) : v;
        setVal(next);
        try {
          localStorage.setItem(key, JSON.stringify(next));
        } catch {}
      }, [key, val]);
      return [val, set];
    }

    async function callClaude(apiKey, messages, imageBase64 = null) {
      const content = imageBase64
        ? [{ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageBase64 } }, { type: 'text', text: messages }]
        : [{ type: 'text', text: messages }];
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1500,
          messages: [{ role: 'user', content }]
        })
      });
      if (!res.ok) throw new Error(`API error ${res.status}`);
      const data = await res.json();
      return data.content[0].text;
    }

    // ============================================================================

    const DRIVE_FILE_NAME = 'BOOKSUM_data.json';
    const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';

    async function driveFetch(token, method, url, body = null, isForm = false) {
      const headers = { Authorization: `Bearer ${token}` };
      const opts = { method, headers };
      if (body && !isForm) {
        headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      } else if (body && isForm) {
        opts.body = body;
      }
      const res = await fetch(url, opts);
      if (!res.ok) {
        const txt = await res.text().catch(() => res.status);
        throw new Error(`Drive API ${res.status}: ${txt}`);
      }
      const ct = res.headers.get('content-type') || '';
      if (ct.includes('json')) return res.json();
      return res.text();
    }

    async function findDriveFile(token, name) {
      const q = encodeURIComponent(`name='${name}' and not trashed`);
      const data = await driveFetch(token, 'GET',
        `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)&pageSize=5`
      );
      return data.files?.[0] || null;
    }

    async function findOrCreateFolder(token, folderName) {
      const q = encodeURIComponent(`name='${folderName}' and mimeType='application/vnd.google-apps.folder' and not trashed`);
      const data = await driveFetch(token, 'GET',
        `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&pageSize=5`
      );
      if (data.files?.[0]) return data.files[0].id;
      // Create the folder
      const created = await driveFetch(token, 'POST',
        'https://www.googleapis.com/drive/v3/files?fields=id',
        { name: folderName, mimeType: 'application/vnd.google-apps.folder' }
      );
      return created.id;
    }

    async function findFileInFolder(token, folderId, name) {
      const q = encodeURIComponent(`'${folderId}' in parents and name='${name}' and not trashed`);
      const data = await driveFetch(token, 'GET',
        `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&pageSize=5`
      );
      return data.files?.[0] || null;
    }

    async function createDriveFile(token, name, content, parentId = null) {
      const metadata = { name, mimeType: 'application/json' };
      if (parentId) metadata.parents = [parentId];
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
      form.append('file', new Blob([content], { type: 'application/json' }));
      return driveFetch(token, 'POST',
        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
        form, true
      );
    }

    async function updateDriveFile(token, fileId, content) {
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ mimeType: 'application/json' })], { type: 'application/json' }));
      form.append('file', new Blob([content], { type: 'application/json' }));
      return driveFetch(token, 'PATCH',
        `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart&fields=id`,
        form, true
      );
    }

    async function readDriveFile(token, fileId) {
      const result = await driveFetch(token, 'GET',
        `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`
      );
      return typeof result === 'string' ? JSON.parse(result) : result;
    }

    async function callClaudeWithPdf(apiKey, pdfBase64, prompt) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true',
          'anthropic-beta': 'pdfs-2024-09-25'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 3000,
          messages: [{
            role: 'user',
            content: [
              { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: pdfBase64 } },
              { type: 'text', text: prompt }
            ]
          }]
        })
      });
      if (!res.ok) throw new Error(`API error ${res.status}`);
      const data = await res.json();
      return data.content[0].text;
    }

    // Display a book cover — prefers direct coverUrl, falls back to authenticated Drive fetch
    function AuthImage({ fileId, token, coverUrl, className, style, fallbackBg }) {
      const [src, setSrc] = useState(coverUrl || '');
      const [errored, setErrored] = useState(false);

      useEffect(() => {
        // If a direct URL is available, use it immediately
        if (coverUrl) { setSrc(coverUrl); setErrored(false); return; }
        if (!fileId || !token) { setErrored(true); return; }
        setSrc(''); setErrored(false);
        let objectUrl;
        fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
          headers: { Authorization: `Bearer ${token}` }
        }).then(r => {
          if (!r.ok) throw new Error('not ok');
          return r.blob();
        }).then(blob => {
          objectUrl = URL.createObjectURL(blob);
          setSrc(objectUrl);
        }).catch(() => setErrored(true));
        return () => { if (objectUrl) URL.revokeObjectURL(objectUrl); };
      }, [fileId, token, coverUrl]);

      if (!src && !errored) {
        return (
          <div className={className} style={{ ...style, background: fallbackBg || '#E5E7EB', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ width: 24, height: 24, border: '3px solid rgba(0,0,0,0.1)', borderTopColor: '#6B7280', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />
          </div>
        );
      }
      if (errored || !src) {
        return (
          <div className={className} style={{ ...style, background: fallbackBg || '#E5E7EB', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 32 }}>
            📚
          </div>
        );
      }
      return <img src={src} alt="" className={className} style={style} onError={() => { if (!coverUrl) setErrored(true); }} />;
    }

    function BookDetailScreen({ book, genres, onBack, onUpdate, apiKey, driveToken }) {
      const [activeTab, setActiveTab] = useState('ideas');
      const [isEditingNotes, setIsEditingNotes] = useState(false);
      const [notesContent, setNotesContent] = useState(book.notes);
      const [toast, setToast] = useState(null);
      const editorRef = useRef(null);
      const scanRef = useRef(null);

      const genre = genres.find(g => g.id === book.genre);

      const handleSaveNotes = () => {
        onUpdate({ ...book, notes: notesContent });
        setIsEditingNotes(false);
        setToast('Notes saved');
      };

      const [loadingPdf, setLoadingPdf] = useState(false);
      const [autoSaveStatus, setAutoSaveStatus] = useState(''); // '' | 'pending' | 'saved'
      const autoSaveTimer = useRef(null);

      // Auto-save notes to Drive 2 s after the user stops typing
      useEffect(() => {
        if (!isEditingNotes) return;
        if (autoSaveTimer.current) clearTimeout(autoSaveTimer.current);
        setAutoSaveStatus('pending');
        autoSaveTimer.current = setTimeout(() => {
          onUpdate({ ...book, notes: notesContent });
          setAutoSaveStatus('saved');
          setTimeout(() => setAutoSaveStatus(''), 2500);
        }, 2000);
        return () => clearTimeout(autoSaveTimer.current);
      }, [notesContent, isEditingNotes]);

      const handleLoadFromPdf = async () => {
        if (!apiKey || !driveToken || !book.summaryId) return;
        setLoadingPdf(true);
        setToast('Downloading your PDF from Drive…');
        try {
          const res = await fetch(`https://www.googleapis.com/drive/v3/files/${book.summaryId}?alt=media`, {
            headers: { Authorization: `Bearer ${driveToken}` }
          });
          if (!res.ok) throw new Error(`Drive download failed (${res.status})`);
          const blob = await res.blob();
          const base64 = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
          });
          setToast('Extracting notes & generating key ideas…');
          // Ask Claude to extract notes HTML and key ideas in one call
          const rawResult = await callClaudeWithPdf(apiKey, base64,
            `You are reading a book summary PDF for "${book.title}" by ${book.author}.\n\nDo two things:\n1. Extract the full content as clean HTML (use <p>, <strong>, <ul><li> — no <html>/<body> tags).\n2. Identify 7–10 key ideas as short 1–2 sentence insights.\n\nRespond with valid JSON only:\n{"notes":"<HTML string>","keyIdeas":["idea 1","idea 2",...]}`
          );
          const match = rawResult.match(/\{[\s\S]*\}/);
          if (!match) throw new Error('Could not parse response');
          const parsed = JSON.parse(match[0]);
          onUpdate({ ...book, notes: parsed.notes || '', keyIdeas: parsed.keyIdeas || [] });
          setNotesContent(parsed.notes || '');
          setToast('Notes & key ideas loaded from PDF ✓');
        } catch (e) {
          setToast('Error: ' + e.message);
        } finally {
          setLoadingPdf(false);
        }
      };

      const handleGenerateIdeas = async () => {
        if (!apiKey) { setToast('API key required'); return; }
        if (!notesContent) { setToast('Add notes first (or load from PDF above)'); return; }
        try {
          const prompt = `Based on these notes about "${book.title}" by ${book.author}, generate 7-10 key ideas as concise numbered insights, each 1-2 sentences. Return ONLY a JSON array of strings. Notes: ${notesContent}`;
          const result = await callClaude(apiKey, prompt);
          const ideas = JSON.parse(result.match(/\[[\s\S]*\]/)[0]);
          onUpdate({ ...book, keyIdeas: ideas });
          setToast('Key ideas generated');
        } catch (e) {
          setToast('Failed to generate ideas');
        }
      };

      const handleToolbarCmd = (cmd, val = null) => {
        if (editorRef.current) {
          editorRef.current.focus();
          document.execCommand(cmd, false, val);
        }
      };

      const handleScanText = async (e) => {
        const file = e.target.files?.[0];
        if (!file || !apiKey) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const base64 = ev.target?.result?.split(',')[1];
          if (!base64) return;
          try {
            const text = await callClaude(apiKey, 'Extract all text from this image exactly as written.', base64);
            if (editorRef.current) {
              editorRef.current.focus();
              document.execCommand('insertText', false, text + ' ');
            }
          } catch (err) {
            setToast('Scan failed');
          }
        };
        reader.readAsDataURL(file);
      };

      const handlePaste = async () => {
        try {
          const text = await navigator.clipboard.readText();
          if (editorRef.current) {
            editorRef.current.focus();
            document.execCommand('insertText', false, text);
          }
        } catch {
          setToast('Paste failed');
        }
      };

      const handlePolishText = async () => {
        if (!apiKey || !editorRef.current) return;
        const content = editorRef.current.innerHTML;
        try {
          const result = await callClaude(apiKey, `Polish and improve this text, keeping the original meaning. Return clean HTML with bold/italic/ul/ol/p formatting: ${content}`);
          setNotesContent(result);
          if (editorRef.current) {
            editorRef.current.innerHTML = result;
          }
        } catch {
          setToast('Polish failed');
        }
      };

      return (
        <>
          <button className="detail-back-btn" onClick={onBack}>←</button>

          <div className="detail-header">
            <div className="detail-hero">
              <AuthImage
                fileId={book.imageId}
                token={driveToken}
                coverUrl={book.coverUrl}
                className="detail-hero-image"
                fallbackBg="rgba(255,255,255,0.15)"
              />
              <div className="detail-hero-text">
                <div className="detail-title">{book.title}</div>
                <div className="detail-author">{book.author}</div>
                <div className="detail-genre-tag">{genre?.label}</div>
              </div>
            </div>
          </div>

          <div className="detail-tabs">
            <button
              className={`tab ${activeTab === 'ideas' ? 'active' : ''}`}
              onClick={() => setActiveTab('ideas')}
            >
              Key Ideas
            </button>
            <button
              className={`tab ${activeTab === 'notes' ? 'active' : ''}`}
              onClick={() => setActiveTab('notes')}
            >
              My Notes
            </button>
          </div>

          <div className="screen-content">
            {activeTab === 'ideas' && (
              <div className="tab-content">
                {book.keyIdeas.length > 0 ? (
                  <>
                    {book.keyIdeas.map((idea, i) => (
                      <div key={i} className="card">
                        <strong>{i + 1}.</strong> {idea}
                      </div>
                    ))}
                  </>
                ) : (
                  <div className="empty-state">
                    <div className="empty-state-icon">✦</div>
                    <p>No key ideas yet</p>
                  </div>
                )}

                {book.summaryId && apiKey && driveToken && (
                  <button
                    className="btn btn-primary"
                    onClick={handleLoadFromPdf}
                    disabled={loadingPdf}
                    style={{ width: '100%', marginTop: '16px', background: '#7C3AED' }}
                  >
                    {loadingPdf ? '⟳ Reading PDF…' : '📄 Load Notes & Ideas from PDF'}
                  </button>
                )}

                {book.summaryId && (
                  <a href={drivePdf(book.summaryId)} target="_blank" rel="noopener noreferrer" style={{ display: 'block', textAlign: 'center', marginTop: '8px', fontSize: '13px', color: 'var(--muted)', textDecoration: 'underline' }}>
                    View raw PDF in Drive
                  </a>
                )}

                {apiKey && book.notes && (
                  <button className="btn btn-primary" onClick={handleGenerateIdeas} style={{ width: '100%', marginTop: '12px' }}>
                    ✦ Re-generate Key Ideas from Notes
                  </button>
                )}
              </div>
            )}

            {activeTab === 'notes' && !isEditingNotes && (
              <div className="tab-content">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                  <strong>My Notes</strong>
                  <button className="btn btn-primary btn-sm" onClick={() => { setIsEditingNotes(true); setNotesContent(book.notes); }}>
                    Edit
                  </button>
                </div>
                {book.notes ? (
                  <div dangerouslySetInnerHTML={{ __html: book.notes }} style={{ fontSize: '15px', lineHeight: '1.6' }} />
                ) : (
                  <div style={{ fontStyle: 'italic', color: '#6B7280' }}>No notes yet — tap Edit to start writing</div>
                )}
              </div>
            )}

            {activeTab === 'notes' && isEditingNotes && (

      const [toast, setToast] = useState(null);
      const editorRef = useRef(null);

      const handleSaveNotes = () => {
        onUpdate({ ...podcast, notes: notesContent });
        setIsEditingNotes(false);
        setToast('Notes saved');

      const handleToolbarCmd = (cmd, val = null) => {
        if (editorRef.current) {
          editorRef.current.focus();
          document.execCommand(cmd, false, val);
        }
      };

      const handleScanText = async (e) => {
        const file = e.target.files?.[0];
        if (!file || !apiKey) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const base64 = ev.target?.result?.split(',')[1];
          if (!base64) return;
          try {
            const text = await callClaude(apiKey, 'Extract all text from this image exactly as written.', base64);
            if (editorRef.current) {
              editorRef.current.focus();
              document.execCommand('insertText', false, text + ' ');
            }
          } catch {
            setToast('Scan failed');
          }
        };
        reader.readAsDataURL(file);
      };

      const handlePaste = async () => {
        try {
          const text = await navigator.clipboard.readText();
          if (editorRef.current) {
            editorRef.current.focus();
            document.execCommand('insertText', false, text);
          }
        } catch {
          setToast('Paste failed');
        }
      };

      const handlePolishText = async () => {
        if (!apiKey || !editorRef.current) return;
        const content = editorRef.current.innerHTML;
        try {
          const result = await callClaude(apiKey, `Polish and improve this text, keeping the original meaning. Return clean HTML: ${content}`);

          if (editorRef.current) {
            editorRef.current.innerHTML = result;

    async function fetchBookCover(title, author) {
      try {
        const q = encodeURIComponent(`${title} ${author}`);
        const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=5`);
        const data = await res.json();
        for (const item of (data.items || [])) {
          const links = item.volumeInfo?.imageLinks;
          const url = links?.thumbnail || links?.smallThumbnail;
          if (url) return url.replace('http://', 'https://').replace('zoom=1', 'zoom=3');
        }
      } catch {}
      return null;
    }

    function AddScreen({ genres, onAddBook, onAddPodcast, onNavigate }) {
      const [type, setType] = useState('book');

      const [podcastHost, setPodcastHost] = useState('');

      const [toast, setToast] = useState(null);
      const [isLoading, setIsLoading] = useState(false);
      const coverTimerRef = useRef(null);

        if (!title.trim() || !author.trim()) return;
        if (coverTimerRef.current) clearTimeout(coverTimerRef.current);
        setCoverLoading(true);
        coverTimerRef.current = setTimeout(async () => {
          const url = await fetchBookCover(title.trim(), author.trim());
          setCoverUrl(url || '');
          setCoverLoading(false);
        }, 1000);
        return () => clearTimeout(coverTimerRef.current);
      }, [title, author]);

      const handleAddBook = () => {
        if (!title || !author) { setToast('Title and author required'); return; }
        onAddBook({ title, author, genre: selectedGenre, notes, coverUrl });

                    {coverLoading

    function App() {
      const [currentScreen, setCurrentScreen] = useState('library');
      const [selectedBook, setSelectedBook] = useState(null);
      const [selectedPodcast, setSelectedPodcast] = useState(null);

      // Data lives in Google Drive — null until loaded
      const [books, setBooks] = useState(null);
      const [podcasts, setPodcasts] = useState(null);
      const [genres, setGenres] = useState(null);
      // Hardcoded Google OAuth Client ID — pre-filled so users never need to enter it manually
      const GOOGLE_CLIENT_ID = '645982162232-jt5q7oua2lroogdoi8aej53o2ag8p91g.apps.googleusercontent.com';
      // Settings (API key) stay local — they're device config, not library data
      const [settings, setSettings] = useLocalStorage('booksum_v2_settings', { apiKey: '', googleClientId: GOOGLE_CLIENT_ID, language: 'en' });

      // Auth state: 'loading' | 'signin' | 'ready'
      const [authState, setAuthState] = useState('loading');

      const handleAddBook = (bookData) => {
        const newBook = {
          id: Math.max(0, ...books.map(b => b.id)) + 1,
          genre: bookData.genre,
          title: bookData.title,
          author: bookData.author,
          imageId: '',
          summaryId: '',
          coverUrl: bookData.coverUrl || '',
          notes: bookData.notes || '',
          keyIdeas: [],
          pdfExtracted: false,
          addedAt: Date.now()
        };
        setBooks([...books, newBook]);
      };

      const handleAddPodcast = (podcastData) => {
        const newPodcast = {
          id: Math.max(0, ...podcasts.map(p => p.id)) + 1,
          title: podcastData.title,
          host: podcastData.host,
          topic: podcastData.topic,
          url: podcastData.url,
          notes: podcastData.notes || '',
          keyIdeas: podcastData.keyIdeas || [],
          addedAt: Date.now()
        };
        setPodcasts([...podcasts, newPodcast]);
      };

      const handleUpdateBook = (updatedBook) => {
        setBooks(books.map(b => b.id === updatedBook.id ? updatedBook : b));
      };

      const handleUpdatePodcast = (updatedPodcast) => {
        setPodcasts(podcasts.map(p => p.id === updatedPodcast.id ? updatedPodcast : p));
      };

      const handleSetApiKey = (key) => {
        setSettings({ ...settings, apiKey: key });
      };

      const handleSetGoogleClientId = (id) => {
        setSettings({ ...settings, googleClientId: id.trim() });
      };

      // Try silent auto-reconnect when app opens
      useEffect(() => {
        const wasConnected = localStorage.getItem('booksum_drive_connected') === 'true';
        const clientId = settings.googleClientId || GOOGLE_CLIENT_ID;
        if (!wasConnected || !clientId) { setAuthState('signin'); return; }
        // Wait for GIS to load (script is async)
        const tryConnect = () => {
          if (!window.google?.accounts?.oauth2) { setAuthState('signin'); return; }
          const email = localStorage.getItem('booksum_drive_email') || '';
          const tc = window.google.accounts.oauth2.initTokenClient({
            client_id: clientId,
            scope: DRIVE_SCOPE,
            hint: email,
            prompt: '',
            callback: async (resp) => {
              if (resp.error) { setAuthState('signin'); return; }
              await handleTokenReceived(resp.access_token);
            }
          });
          tc.requestAccessToken();
        };
        // Give GIS script up to 3s to load
        if (window.google?.accounts?.oauth2) { tryConnect(); }
        else {
          let attempts = 0;
          const iv = setInterval(() => {
            attempts++;
            if (window.google?.accounts?.oauth2) { clearInterval(iv); tryConnect(); }
            else if (attempts > 30) { clearInterval(iv); setAuthState('signin'); }
          }, 100);
        }
      }, []);

      const handleTokenReceived = async (tok) => {
        setDriveToken(tok);
        setDriveError(null);
        try {
          const u = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
            headers: { Authorization: `Bearer ${tok}` }
          }).then(r => r.json());
          const email = u.email || '';
          setDriveEmail(email);
          localStorage.setItem('booksum_drive_email', email);
        } catch {}
        await loadFromDriveWithToken(tok, true);
        setAuthState('ready');
        localStorage.setItem('booksum_drive_connected', 'true');
      };

      // ── Google Drive sync state ──────────────────────────────────────────────
      const [driveToken, setDriveToken] = useState(null);
      const [driveFileId, setDriveFileId] = useState(() => {
        try { return localStorage.getItem('booksum_drive_fid') || null; } catch { return null; }
      });
      const [driveConnected, setDriveConnected] = useState(false);
      const [driveSyncing, setDriveSyncing] = useState(false);
      const [driveLastSync, setDriveLastSync] = useState(() => {
        try { return localStorage.getItem('booksum_drive_sync') || null; } catch { return null; }
      });
      const [driveError, setDriveError] = useState(null);
      const [driveEmail, setDriveEmail] = useState(() => {
        try { return localStorage.getItem('booksum_drive_email') || null; } catch { return null; }
      });
      const syncTimerRef = useRef(null);
      const tokenClientRef = useRef(null);
      const extractionStartedRef = useRef(false);
      const [extractionProgress, setExtractionProgress] = useState(null);
      // { current, total, title } — null when idle

      // Persist driveFileId to localStorage whenever it changes
      useEffect(() => {
        if (driveFileId) localStorage.setItem('booksum_drive_fid', driveFileId);
        else localStorage.removeItem('booksum_drive_fid');
      }, [driveFileId]);

      // Build / rebuild the GIS token client when clientId is set
      const buildTokenClient = useCallback((clientId) => {
        if (!clientId || !window.google?.accounts?.oauth2) return null;
        return window.google.accounts.oauth2.initTokenClient({
          client_id: clientId,
          scope: DRIVE_SCOPE,
          callback: async (resp) => {
            if (resp.error) {
              setDriveError(resp.error_description || resp.error);
              setAuthState('signin');
              return;
            }
            await handleTokenReceived(resp.access_token);
          }
        });
      }, []);

      const connectDrive = () => {
        const clientId = settings.googleClientId || GOOGLE_CLIENT_ID;
        if (!window.google?.accounts?.oauth2) {
          setDriveError('Google library not loaded — check your internet connection.');
          return;
        }
        if (!tokenClientRef.current) {
          tokenClientRef.current = buildTokenClient(clientId);
        }
        tokenClientRef.current?.requestAccessToken();
      };

      const disconnectDrive = () => {
        if (driveToken && window.google?.accounts?.oauth2) {
          try { window.google.accounts.oauth2.revoke(driveToken, () => {}); } catch {}
        }
        setDriveToken(null);
        setDriveConnected(false);
        setDriveFileId(null);
        setDriveEmail(null);
        setDriveError(null);
        setBooks(null);
        setPodcasts(null);
        setGenres(null);
        setAuthState('signin');
        localStorage.removeItem('booksum_drive_fid');
        localStorage.removeItem('booksum_drive_folder');
        localStorage.removeItem('booksum_drive_email');
        localStorage.removeItem('booksum_drive_sync');
        localStorage.removeItem('booksum_drive_connected');
      };

      // saveToDrive — takes live state values as args so it can be called from effects
      const saveToDriveWithToken = useCallback(async (tok, bks, pods, gnrs, fid) => {
        if (!tok) return;
        setDriveSyncing(true);
        setDriveError(null);
        try {
          const payload = JSON.stringify({ version: 2, exportedAt: new Date().toISOString(), books: bks, podcasts: pods, genres: gnrs }, null, 2);
          let resolvedFid = fid;
          if (!resolvedFid) {
            // Fallback: find or create folder + file
            let folderId = localStorage.getItem('booksum_drive_folder') || null;
            if (!folderId) {
              folderId = await findOrCreateFolder(tok, 'BOOKSUM');
              localStorage.setItem('booksum_drive_folder', folderId);
            }
            const existing = await findFileInFolder(tok, folderId, DRIVE_FILE_NAME);
            resolvedFid = existing ? existing.id : (await createDriveFile(tok, DRIVE_FILE_NAME, payload, folderId)).id;
            setDriveFileId(resolvedFid);
            localStorage.setItem('booksum_drive_fid', resolvedFid);
          } else {
            await updateDriveFile(tok, resolvedFid, payload);
          }
          const now = new Date().toISOString();
          setDriveLastSync(now);
          localStorage.setItem('booksum_drive_sync', now);
        } catch (e) {
          setDriveError(e.message);
        } finally {
          setDriveSyncing(false);
        }
      }, []);

      const loadFromDriveWithToken = async (tok, isInitialLoad = false) => {
        if (!tok) return;
        setDriveSyncing(true);
        setDriveError(null);
        try {
          // 1. Find or create the BOOKSUM folder in Drive
          let folderId = localStorage.getItem('booksum_drive_folder') || null;
          if (!folderId) {
            folderId = await findOrCreateFolder(tok, 'BOOKSUM');
            localStorage.setItem('booksum_drive_folder', folderId);
          }

          // 2. Find or create BOOKSUM_data.json inside that folder
          let fid = localStorage.getItem('booksum_drive_fid') || null;
          if (!fid) {
            const existing = await findFileInFolder(tok, folderId, DRIVE_FILE_NAME);
            if (existing) {
              fid = existing.id;
              setDriveFileId(fid);
              localStorage.setItem('booksum_drive_fid', fid);
            }
          }

          if (fid) {
            // File exists — load library from it
            const data = await readDriveFile(tok, fid);
            setBooks(data.books || SEED_BOOKS);
            setPodcasts(data.podcasts || []);
            setGenres(data.genres || DEFAULT_GENRES);
          } else {
            // First-ever connect — seed Drive with starter library
            const initialData = { version: 2, exportedAt: new Date().toISOString(), books: SEED_BOOKS, podcasts: [], genres: DEFAULT_GENRES };
            const payload = JSON.stringify(initialData, null, 2);
            const created = await createDriveFile(tok, DRIVE_FILE_NAME, payload, folderId);
            fid = created.id;
            setDriveFileId(fid);
            localStorage.setItem('booksum_drive_fid', fid);
            setBooks(SEED_BOOKS);
            setPodcasts([]);
            setGenres(DEFAULT_GENRES);
          }

          const now = new Date().toISOString();
          setDriveLastSync(now);
          localStorage.setItem('booksum_drive_sync', now);
          setDriveConnected(true);
        } catch (e) {
          setDriveError(e.message);
          if (isInitialLoad) setAuthState('signin');
        } finally {
          setDriveSyncing(false);
        }
      };

      // Auto-sync 3 s after data changes (debounced) — only when data is loaded
      useEffect(() => {
        if (!driveConnected || !driveToken || books === null || podcasts === null || genres === null) return;
        if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
        syncTimerRef.current = setTimeout(() => {
          saveToDriveWithToken(driveToken, books, podcasts, genres, driveFileId);
        }, 3000);
        return () => clearTimeout(syncTimerRef.current);
      }, [books, podcasts, genres, driveConnected, driveToken]);

      // ── Background PDF extraction for all seeded books ──────────────────────
      useEffect(() => {
        if (authState !== 'ready' || !books || !driveToken || !settings.apiKey) return;
        if (extractionStartedRef.current) return;

        const queue = books.filter(b =>
          b.summaryId && !b.pdfExtracted && (!b.notes || b.notes.trim() === '') && (!b.keyIdeas || b.keyIdeas.length === 0)
        );
        if (queue.length === 0) return;
        extractionStartedRef.current = true;

        const blobToBase64 = (blob) => new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });

        (async () => {
          for (let i = 0; i < queue.length; i++) {
            const book = queue[i];
            setExtractionProgress({ current: i + 1, total: queue.length, title: book.title });
            try {
              const res = await fetch(`https://www.googleapis.com/drive/v3/files/${book.summaryId}?alt=media`, {
                headers: { Authorization: `Bearer ${driveToken}` }
              });
              if (!res.ok) throw new Error(`Drive ${res.status}`);
              const base64 = await blobToBase64(await res.blob());
              const raw = await callClaudeWithPdf(settings.apiKey, base64,
                `You are reading a book summary PDF for "${book.title}" by ${book.author}.\nExtract the full content as clean HTML (use <p>, <strong>, <ul><li> — no html/body tags) and generate 7–10 key ideas as short 1–2 sentence insights.\nRespond with valid JSON only, no markdown:\n{"notes":"<HTML>","keyIdeas":["idea 1","idea 2",...]}`
              );
              const match = raw.match(/\{[\s\S]*\}/);
              if (!match) throw new Error('Parse failed');
              const parsed = JSON.parse(match[0]);
              setBooks(prev => prev.map(b => b.id === book.id
                ? { ...b, notes: parsed.notes || '', keyIdeas: parsed.keyIdeas || [], pdfExtracted: true }
                : b
              ));
            } catch {
              // Mark attempted so we don't retry endlessly
              setBooks(prev => prev.map(b => b.id === book.id ? { ...b, pdfExtracted: true } : b));
            }
            // Brief pause between calls to respect rate limits
            if (i < queue.length - 1) await new Promise(r => setTimeout(r, 2000));
          }
          setExtractionProgress(null);
        })();
      }, [authState]);

      // ── Auth gates ──────────────────────────────────────────────────────────
      if (authState === 'loading') {
        return (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100vh', background: 'var(--cream)', gap: '16px' }}>
            <LogoSVG size={48} />
            <div style={{ fontSize: '13px', color: 'var(--muted)' }}>Loading your library…</div>
          </div>
        );
      }

      if (authState === 'signin') {
        return (
          <SignInScreen
            onConnect={connectDrive}
            onSetClientId={handleSetGoogleClientId}
            googleClientId={settings.googleClientId || ''}
            error={driveError}
            loading={driveSyncing}
          />
        );
      }

      // ── Main app (authState === 'ready') ─────────────────────────────────────
      return (
        <div className="app-container">
          {currentScreen === 'library' && (
            <LibraryScreen
              books={books}
              genres={genres}
              onSelectBook={(book) => {
                setSelectedBook(book);
                setCurrentScreen('book-detail');
              }}
              apiKey={settings.apiKey}
              onNavigate={setCurrentScreen}
              driveToken={driveToken}
              driveEmail={driveEmail}
              extractionProgress={extractionProgress}
            />
          )}

          {currentScreen === 'book-detail' && selectedBook && (
            <BookDetailScreen
              book={selectedBook}
              genres={genres}
              onBack={() => setCurrentScreen('library')}
              onUpdate={(updated) => {
                handleUpdateBook(updated);
                setSelectedBook(updated);
              }}
              apiKey={settings.apiKey}
              driveToken={driveToken}
            />
          )}

          {currentScreen === 'account' && (
            <AccountScreen
              driveEmail={driveEmail}
              onBack={() => setCurrentScreen('library')}
              onSignOut={disconnectDrive}
            />
          )}

          {currentScreen === 'podcasts' && (
            <PodcastsScreen
              podcasts={podcasts}
              genres={genres}
              onSelectPodcast={(podcast) => {
                setSelectedPodcast(podcast);
                setCurrentScreen('podcast-detail');
              }}
              onNavigate={setCurrentScreen}
            />
          )}

          {currentScreen === 'podcast-detail' && selectedPodcast && (
            <PodcastDetailScreen
              podcast={selectedPodcast}
              genres={genres}
              onBack={() => setCurrentScreen('podcasts')}
              onUpdate={(updated) => {
                handleUpdatePodcast(updated);
                setSelectedPodcast(updated);
              }}
              apiKey={settings.apiKey}
            />
          )}

          {currentScreen === 'add' && (
            <AddScreen
              genres={genres}
              onAddBook={handleAddBook}
              onAddPodcast={handleAddPodcast}
              onNavigate={setCurrentScreen}
            />
          )}

          {currentScreen === 'settings' && (
            <SettingsScreen
              apiKey={settings.apiKey}
              onSetApiKey={handleSetApiKey}
              googleClientId={settings.googleClientId || ''}
              onSetGoogleClientId={handleSetGoogleClientId}
              driveConnected={driveConnected}
              driveEmail={driveEmail}
              driveSyncing={driveSyncing}
              driveLastSync={driveLastSync}
              driveError={driveError}
              onConnectDrive={connectDrive}
              onDisconnectDrive={disconnectDrive}
              onSyncNow={() => saveToDriveWithToken(driveToken, books, podcasts, genres, driveFileId)}
              onNavigate={setCurrentScreen}
            />
          )}

          {currentScreen === 'statistics' && (
            <StatisticsScreen
              books={books}
              podcasts={podcasts}
              genres={genres}
              onBack={() => setCurrentScreen('settings')}
              apiKey={settings.apiKey}
            />
          )}

          {currentScreen === 'genres' && (
            <ManageGenresScreen
              genres={genres}
              books={books}
              onUpdateGenres={setGenres}
              onBack={() => setCurrentScreen('settings')}
            />
          )}

          {/* Bottom Navigation */}
          <div className="bottom-nav">
            <div
              className={`nav-item ${currentScreen === 'library' ? 'active' : ''}`}
              onClick={() => setCurrentScreen('library')}
            >
              <div style={{ fontSize: '20px' }}>📚</div>
              <div>Library</div>
            </div>
            <div
              className={`nav-item ${currentScreen === 'podcasts' ? 'active' : ''}`}
              onClick={() => setCurrentScreen('podcasts')}
            >
              <div style={{ fontSize: '20px' }}>🎧</div>
              <div>Podcasts</div>
            </div>
            <div
              className={`nav-item`}
              onClick={() => setCurrentScreen('add')}
            >
              <div style={{ fontSize: '20px' }}>➕</div>
              <div>Add</div>
            </div>
            <div
              className={`nav-item ${currentScreen === 'settings' ? 'active' : ''}`}
              onClick={() => setCurrentScreen('settings')}
            >
              <div style={{ fontSize: '20px' }}>⚙️</div>
              <div>Settings</div>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================================
    // RENDER APP
    // ============================================================================

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
